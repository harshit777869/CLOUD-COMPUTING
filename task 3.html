<!DOCTYPE html>
<html>
<head>
<title>Multi Cloud Architecture</title>

<style>
body{font-family:Arial;background:#121212;color:white;text-align:center;}
.box{width:500px;margin:auto;margin-top:40px;background:#1e1e1e;padding:20px;border-radius:10px;}
.card{background:#2d2d2d;margin:10px;padding:10px;border-radius:8px;}
button{padding:10px;background:#00ff99;border:none;}
</style>
</head>
<body>

<div class="box">

<h2>Multi Cloud Architecture</h2>

<button onclick="show()">Deploy Architecture</button>

<div id="out"></div>

</div>

<script>
function show(){

    let arch = [
        "AWS → Storage (S3)",
        "AWS → Compute (EC2)",
        "Google Cloud → AI Services",
        "Azure → Database Layer",
        "Interconnection → API Gateway"
    ];

    out.innerHTML = "";

    arch.forEach(a=>{
        out.innerHTML += `<div class="card">${a}</div>`;
    });
}
</script>

</body>
</html>
